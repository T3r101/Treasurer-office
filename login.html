<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Treasurer's Office</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: #111827 url('/image/logo.png') no-repeat center center fixed;
            background-size: cover;
            min-height: 100vh;
            color: #111827;
        }
        .page-wrapper {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }
    </style>
</head>
<body class="page-wrapper">

    <!-- Centered title at the top -->
    <div class="w-full max-w-md glass-card rounded-3xl shadow-2xl border border-slate-200 p-10 text-slate-900">
        <h1 class="text-4xl font-extrabold text-slate-900 mb-10 text-center">Malaybalay City</h1>


    <!-- Main White Card -->
    <div class="w-full max-w-md bg-white rounded-2xl shadow-xl border border-slate-200 p-10">
        
        <!-- Official title inside the card -->
        <h2 class="text-2xl font-bold text-slate-800 text-center mb-8">Treasurer's Office</h2>

        <form action="/login-handler" method="POST" class="space-y-6">
            <div>
                <label for="email" class="block text-sm font-semibold text-slate-700 mb-2">Email Address</label>
                <input type="email" id="email" name="email" required placeholder="admin@treasurer.gov"
                    class="w-full rounded-xl border border-slate-200 bg-slate-50 px-4 py-3 text-slate-900 focus:border-blue-500 focus:ring-2 focus:ring-blue-200 outline-none transition-all" />
            </div>

            <div>
                <label for="password" class="block text-sm font-semibold text-slate-700 mb-2">Password</label>
                <input type="password" id="password" name="password" required placeholder="••••••••"
                    class="w-full rounded-xl border border-slate-200 bg-slate-50 px-4 py-3 text-slate-900 focus:border-blue-500 focus:ring-2 focus:ring-blue-200 outline-none transition-all" />
            </div>

            <button type="submit" class="w-full rounded-xl bg-blue-700 py-3 text-sm font-bold text-white transition hover:bg-blue-800 shadow-md">
                Login
            </button>
        </form>
    </div>

</body>
</html>
